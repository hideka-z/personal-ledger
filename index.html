<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>サプリ在庫管理</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500;700&family=Rounded+Mplus+1c:wght@400;500;700&display=swap");

    :root {
      --bg: #fcfcfc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --danger: #dc2626;
      --ok: #059669;
      --line: #e5e7eb;
      --warn-bg: #fff7ed;
      --warn-border: #fb923c;
      --radius: 14px;
      --shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Kiwi Maru", "Rounded Mplus 1c", system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.5;
    }

    .container {
      max-width: 920px;
      margin: 0 auto;
      padding: 10px 14px 96px;
    }

    h1 {
      margin: 2px 0 12px;
      font-size: 1.5rem;
    }

    .title-note {
      margin: -6px 0 14px;
      line-height: 1.45;
      font-size: 0.82rem;
      color: #7a8391;
    }

    .title-note-line {
      display: block;
    }

    .title-note-line:nth-child(2) {
      white-space: nowrap;
    }

    .title-note-icon {
      width: 0.95em;
      height: 0.95em;
      display: inline-block;
      vertical-align: -0.12em;
      margin: 0 0.1em;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .top-area {
      background: #fcfcfc;
      border-radius: 12px;
      padding: 6px 10px 12px;
      margin-bottom: 12px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 0;
      flex-wrap: nowrap;
    }

    .toolbar-left,
    .toolbar-right {
      min-width: 0;
      display: flex;
      align-items: center;
    }

    .toolbar-left {
      flex: 0 0 60%;
      max-width: 60%;
      justify-content: flex-start;
    }

    .toolbar-right {
      flex: 0 0 40%;
      max-width: 40%;
      justify-content: flex-end;
      margin-left: auto;
      gap: 2px;
    }

    .toolbar-right > button {
      flex: 0 0 auto;
      min-width: 0;
    }

    button,
    .file-label {
      border: 0;
      background: var(--primary);
      color: #fff;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      text-align: center;
      min-height: 46px;
    }

    button {
      transition: transform 0.08s ease, filter 0.08s ease;
    }

    button:active {
      transform: scale(0.96);
      filter: brightness(0.9);
    }

    button.secondary,
    .file-label.secondary {
      background: #374151;
    }

    button.ghost {
      background: #e5e7eb;
      color: #111827;
    }

    button.danger {
      background: var(--danger);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .file-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    input[type="file"] {
      display: none;
    }

    .meta {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .card-list {
      display: grid;
      gap: 12px;
    }

    .card {
      background: #e1e6f3;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .card.warn {
      border-color: var(--warn-border);
      background: var(--warn-bg);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .card-header-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      flex-wrap: nowrap;
      margin-left: auto;
      flex: 1;
      min-width: 0;
    }

    .card-title {
      margin: 0;
      font-size: 1.12rem;
      font-weight: 700;
    }

    .stock {
      font-weight: 700;
    }

    #addBtn {
      background: #9E76B4;
    }

    #exportBtn {
      color: #6F6578;
    }

    #importBtn {
      color: #6F6578;
    }

    button[data-action="increase"] {
      background: #20a69a;
    }

    #saveDialogBtn {
      background: #20a69a;
    }

    button[data-action="decrease"] {
      background: #D93A49;
    }

    .stock.low {
      color: #9a3412;
    }

    .small {
      font-size: 0.88rem;
      color: var(--muted);
    }

    .memo {
      margin-top: 4px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.9rem;
    }

    .btn-row {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 35% 35%;
      justify-content: space-between;
      gap: 8px;
    }

    .btn-row button {
      border-radius: 999px;
    }

    .icon-actions {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 2px;
      margin-right: -4px;
    }

    .icon-btn {
      width: auto;
      min-width: 40px;
      min-height: 40px;
      padding: 8px 6px;
      border: none;
      background: transparent;
      color: #374151;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:active {
      transform: scale(0.85);
      filter: brightness(0.8);
    }

    .icon-btn svg {
      width: 20px;
      height: 20px;
      display: block;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .toolbar-btn {
      min-height: 40px;
      padding: 9px 12px;
      font-size: 0.9rem;
      line-height: 1.2;
    }

    .toolbar-icon-btn {
      min-height: 40px;
      padding: 8px;
      width: 38px;
      min-width: 38px;
    }

    #addBtn {
      width: 100%;
    }

    #undoBtn {
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      min-width: 38px;
      color: #6F6578;
    }

    #undoBtn svg {
      width: 20px;
      height: 20px;
      display: block;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .history {
      margin-top: 12px;
      border-top: 1px dashed #d1d5db;
      padding-top: 10px;
    }

    .history h4 {
      margin: 0 0 6px;
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 700;
    }

    .history ul {
      margin: 0;
      padding-left: 18px;
    }

    .history li {
      font-size: 0.86rem;
      margin-bottom: 3px;
    }

    dialog {
      border: none;
      border-radius: 16px;
      width: min(94vw, 520px);
      padding: 0;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
    }

    dialog::backdrop {
      background: rgba(17, 24, 39, 0.5);
    }

    .modal {
      padding: 16px;
    }

    .modal h3 {
      margin: 0 0 12px;
      font-size: 1.06rem;
    }

    .field {
      margin-bottom: 10px;
    }

    .field label {
      display: block;
      font-size: 0.88rem;
      color: #374151;
      margin-bottom: 5px;
      font-weight: 600;
    }

    .field input,
    .field textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 10px;
      font-size: 1rem;
      background: #fff;
    }

    .field textarea {
      resize: vertical;
      min-height: 72px;
    }

    .modal-actions {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .empty {
      text-align: center;
      background: #fff;
      border: 1px dashed #cbd5e1;
      border-radius: var(--radius);
      padding: 24px 10px;
      color: var(--muted);
    }

    .tag {
      display: inline-block;
      font-size: 0.77rem;
      padding: 3px 8px;
      border-radius: 999px;
      background: #e0e7ff;
      color: #1e3a8a;
      margin-top: 3px;
    }
  </style>
</head>
<body>
  <!-- icon-definitions-start -->
  <svg aria-hidden="true" focusable="false" width="0" height="0" style="position:absolute; width:0; height:0; overflow:hidden;">
    <symbol id="icon-export" viewBox="0 0 24 24">
      <path d="M12 16V4" />
      <path d="M8 8l4-4 4 4" />
      <path d="M4 20h16" />
    </symbol>
    <symbol id="icon-import" viewBox="0 0 24 24">
      <path d="M12 4v12" />
      <path d="M8 12l4 4 4-4" />
      <path d="M4 20h16" />
    </symbol>
    <symbol id="icon-edit" viewBox="0 0 24 24">
      <path d="M3 21l3.6-1 11-11a2.2 2.2 0 0 0-3.1-3.1l-11 11L3 21z" />
      <path d="M13.5 5.5l3.1 3.1" />
    </symbol>
    <symbol id="icon-delete" viewBox="0 0 24 24">
      <path d="M4 7h16" />
      <path d="M9 4h6" />
      <path d="M7 7l1 13h8l1-13" />
      <path d="M10 11v6" />
      <path d="M14 11v6" />
    </symbol>
    <symbol id="icon-undo" viewBox="0 0 24 24">
      <path d="M10 7L6 11l4 4" />
      <path d="M7 11h7a5 5 0 1 1 0 10h-2" />
    </symbol>
  </svg>
  <!-- icon-definitions-end -->
  <div class="container">
    <div class="top-area">
      <h1>サプリ在庫管理</h1>
      <div class="title-note">
        <span class="title-note-line">データはスマホ本体に保存されます</span>
        <span class="title-note-line">
          <!-- 共通アイコン定義を参照 -->
          <svg class="title-note-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <use href="#icon-export"></use>
          </svg>
          はエクスポート・
          <!-- 共通アイコン定義を参照 -->
          <svg class="title-note-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <use href="#icon-import"></use>
          </svg>
          はインポート/ファイル形式JSON
        </span>
      </div>

      <div class="toolbar">
        <div class="toolbar-left">
          <button id="addBtn" class="toolbar-btn">サプリカード追加</button>
        </div>
        <div class="toolbar-right">
          <button id="undoBtn" class="icon-btn toolbar-icon-btn" aria-label="Undo（1回）" disabled>
            <!-- 共通アイコン定義を参照 -->
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <use href="#icon-undo"></use>
            </svg>
          </button>
          <button id="exportBtn" class="icon-btn toolbar-icon-btn" aria-label="JSONエクスポート">
            <!-- 共通アイコン定義を参照 -->
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <use href="#icon-export"></use>
            </svg>
          </button>
          <button id="importBtn" type="button" class="icon-btn toolbar-icon-btn" aria-label="JSONインポート">
            <!-- 共通アイコン定義を参照 -->
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <use href="#icon-import"></use>
            </svg>
          </button>
        </div>
      </div>
      <input id="importInput" type="file" accept="application/json" />
    </div>

    <div id="summary" class="meta"></div>
    <div id="cardList" class="card-list"></div>
  </div>

  <dialog id="supplementDialog">
    <form class="modal" id="supplementForm" method="dialog">
      <h3 id="dialogTitle">サプリ追加</h3>
      <div class="field">
        <label for="nameInput">サプリ名（必須）</label>
        <input id="nameInput" maxlength="60" required />
      </div>
      <div class="field">
        <label for="stockInput">現在在庫数（必須）</label>
        <input id="stockInput" type="number" min="0" step="0.01" required />
      </div>
      <div class="field">
        <label for="unitInput">単位（例：粒 / g / ml、必須）</label>
        <input id="unitInput" maxlength="12" required />
      </div>
      <div class="field">
        <label for="thresholdInput">補充目安（任意）</label>
        <input id="thresholdInput" type="number" min="0" step="0.01" placeholder="未入力なら判定しない" />
      </div>
      <div class="field">
        <label for="memoInput">メモ（任意）</label>
        <textarea id="memoInput" maxlength="300" placeholder="飲むタイミングなど"></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="ghost" id="cancelDialogBtn">キャンセル</button>
        <button type="submit" id="saveDialogBtn">保存</button>
      </div>
    </form>
  </dialog>

  <dialog id="quantityDialog">
    <form class="modal" id="quantityForm" method="dialog">
      <h3 id="quantityDialogTitle">数量入力</h3>
      <div class="field">
        <label for="quantityInput">数量（整数のみ）</label>
        <input id="quantityInput" type="text" inputmode="numeric" pattern="[0-9]*" required />
      </div>
      <div class="small" id="quantityUnitText"></div>
      <div class="modal-actions">
        <button type="button" class="ghost" id="cancelQuantityBtn">キャンセル</button>
        <button type="submit" id="saveQuantityBtn">確定</button>
      </div>
    </form>
  </dialog>

  <script>
    (function () {
      const STORAGE_KEY = "supplement_inventory_v1";
      const IMPORT_MAX_ITEMS = 500;

      const state = {
        supplements: [],
        editingId: null,
        undoSnapshot: null,
        quantityRequest: null,
      };

      const els = {
        addBtn: document.getElementById("addBtn"),
        undoBtn: document.getElementById("undoBtn"),
        exportBtn: document.getElementById("exportBtn"),
        importBtn: document.getElementById("importBtn"),
        importInput: document.getElementById("importInput"),
        cardList: document.getElementById("cardList"),
        summary: document.getElementById("summary"),
        dialog: document.getElementById("supplementDialog"),
        form: document.getElementById("supplementForm"),
        dialogTitle: document.getElementById("dialogTitle"),
        nameInput: document.getElementById("nameInput"),
        stockInput: document.getElementById("stockInput"),
        unitInput: document.getElementById("unitInput"),
        thresholdInput: document.getElementById("thresholdInput"),
        memoInput: document.getElementById("memoInput"),
        cancelDialogBtn: document.getElementById("cancelDialogBtn"),
        quantityDialog: document.getElementById("quantityDialog"),
        quantityForm: document.getElementById("quantityForm"),
        quantityDialogTitle: document.getElementById("quantityDialogTitle"),
        quantityInput: document.getElementById("quantityInput"),
        quantityUnitText: document.getElementById("quantityUnitText"),
        cancelQuantityBtn: document.getElementById("cancelQuantityBtn"),
      };

      function uid() {
        return "s_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
      }

      function toNumber(value) {
        const n = Number(value);
        return Number.isFinite(n) ? n : NaN;
      }

      function deepClone(data) {
        return JSON.parse(JSON.stringify(data));
      }

      function formatDate(iso) {
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return "不明日時";
        return d.toLocaleString("ja-JP", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function formatQty(value) {
        const rounded = Math.round(value * 100) / 100;
        return Number.isInteger(rounded) ? String(rounded) : String(rounded);
      }

      function isLowStock(item) {
        return item.threshold !== null && item.stock <= item.threshold;
      }

      function sortSupplements(items) {
        return items.slice().sort((a, b) => {
          const timeA = Date.parse(a.updatedAt || a.createdAt || 0);
          const timeB = Date.parse(b.updatedAt || b.createdAt || 0);
          if (timeA !== timeB) return timeB - timeA;
          return a.name.localeCompare(b.name, "ja");
        });
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ supplements: state.supplements }));
      }

      function loadState() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          state.supplements = [];
          return;
        }

        try {
          const parsed = JSON.parse(raw);
          const list = Array.isArray(parsed.supplements) ? parsed.supplements : [];
          state.supplements = list
            .map((item) => normalizeItem(item))
            .filter(Boolean);
        } catch (_) {
          state.supplements = [];
        }
      }

      function normalizeItem(item) {
        if (!item || typeof item !== "object") return null;
        const name = typeof item.name === "string" ? item.name.trim() : "";
        const unit = typeof item.unit === "string" ? item.unit.trim() : "";
        const stock = toNumber(item.stock);
        if (!name || !unit || !Number.isFinite(stock) || stock < 0) return null;

        let threshold = null;
        if (item.threshold !== null && item.threshold !== undefined && item.threshold !== "") {
          const t = toNumber(item.threshold);
          if (Number.isFinite(t) && t >= 0) threshold = t;
        }

        const memo = typeof item.memo === "string" ? item.memo.slice(0, 300) : "";
        const history = Array.isArray(item.history)
          ? item.history
              .map((h) => {
                if (!h || typeof h !== "object") return null;
                const amount = toNumber(h.amount);
                const at = typeof h.at === "string" ? h.at : "";
                if (!Number.isFinite(amount) || !at) return null;
                return { at, amount };
              })
              .filter(Boolean)
              .slice(-5)
          : [];

        const now = new Date().toISOString();
        return {
          id: typeof item.id === "string" && item.id ? item.id : uid(),
          name,
          stock: Math.round(stock * 100) / 100,
          unit,
          threshold,
          memo,
          history,
          createdAt: typeof item.createdAt === "string" ? item.createdAt : now,
          updatedAt: typeof item.updatedAt === "string" ? item.updatedAt : (typeof item.createdAt === "string" ? item.createdAt : now),
        };
      }

      function snapshotForUndo() {
        state.undoSnapshot = {
          supplements: deepClone(state.supplements),
          at: new Date().toISOString(),
        };
        els.undoBtn.disabled = false;
      }

      function clearUndo() {
        state.undoSnapshot = null;
        els.undoBtn.disabled = true;
      }

      function applyUndo() {
        if (!state.undoSnapshot) return;
        state.supplements = deepClone(state.undoSnapshot.supplements);
        saveState();
        clearUndo();
        render();
      }

      function render() {
        const sorted = sortSupplements(state.supplements);
        const lowCount = sorted.filter(isLowStock).length;
        els.summary.textContent = `全${sorted.length}件 / 補充目安以下 ${lowCount}件`;

        if (sorted.length === 0) {
          els.cardList.innerHTML = '<div class="empty">まだサプリがありません。<br>「＋ サプリを追加」から始めてください。</div>';
          return;
        }

        els.cardList.innerHTML = sorted.map((item) => renderCard(item)).join("");

        els.cardList.querySelectorAll("[data-action]").forEach((btn) => {
          btn.addEventListener("click", handleCardAction);
        });
      }

      function renderCard(item) {
        const low = isLowStock(item);
        const thresholdText = item.threshold === null ? "未設定" : `${formatQty(item.threshold)} ${item.unit}`;
        const historyHtml = item.history.length
          ? `<ul>${item.history.slice().reverse().map((h) => `<li>${formatDate(h.at)}：${h.amount > 0 ? "+" : ""}${formatQty(h.amount)} ${item.unit}</li>`).join("")}</ul>`
          : "<div class=\"small\">履歴はまだありません</div>";

        return `
          <article class="card ${low ? "warn" : ""}">
            <div class="card-header">
              <div>
                <h2 class="card-title">${escapeHtml(item.name)}</h2>
                ${low ? '<div class="tag">補充目安以下</div>' : ""}
              </div>
              <div class="card-header-actions">
                <div class="stock ${low ? "low" : ""}">在庫：${formatQty(item.stock)} ${escapeHtml(item.unit)}</div>
                <div class="icon-actions">
                  <button data-action="edit" data-id="${item.id}" class="icon-btn" aria-label="編集">
                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                      <use href="#icon-edit"></use>
                    </svg>
                  </button>
                  <button data-action="delete" data-id="${item.id}" class="icon-btn" aria-label="削除">
                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                      <use href="#icon-delete"></use>
                    </svg>
                  </button>
                </div>
              </div>
            </div>
            <div class="small">補充目安：${escapeHtml(thresholdText)}</div>
            ${item.memo ? `<div class="memo">メモ：${escapeHtml(item.memo)}</div>` : ""}

            <div class="btn-row">
              <button data-action="increase" data-id="${item.id}">＋ 増えた量</button>
              <button data-action="decrease" data-id="${item.id}" class="danger">－ 使った量</button>
            </div>

            <div class="history">
              <h4>直近5件の履歴</h4>
              ${historyHtml}
            </div>
          </article>
        `;
      }

      function escapeHtml(str) {
        return String(str)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function openAddDialog() {
        state.editingId = null;
        els.dialogTitle.textContent = "サプリ追加";
        els.form.reset();
        els.stockInput.value = "0";
        els.thresholdInput.value = "";
        els.dialog.showModal();
      }

      function openEditDialog(item) {
        state.editingId = item.id;
        els.dialogTitle.textContent = "サプリ編集";
        els.nameInput.value = item.name;
        els.stockInput.value = String(item.stock);
        els.unitInput.value = item.unit;
        els.thresholdInput.value = item.threshold === null ? "" : String(item.threshold);
        els.memoInput.value = item.memo || "";
        els.dialog.showModal();
      }

      function closeDialog() {
        if (els.dialog.open) els.dialog.close();
      }

      function closeQuantityDialog() {
        if (els.quantityDialog.open) els.quantityDialog.close();
      }

      function requestQuantity(item, action) {
        return new Promise((resolve) => {
          const label = action === "increase" ? "増えた量" : "使った量";
          state.quantityRequest = resolve;
          els.quantityDialogTitle.textContent = `${item.name} の${label}`;
          els.quantityUnitText.textContent = `単位: ${item.unit}`;
          els.quantityForm.reset();
          els.quantityInput.value = "1";
          els.quantityDialog.showModal();
          els.quantityInput.focus();
          els.quantityInput.select();
        });
      }

      function settleQuantityRequest(value) {
        if (!state.quantityRequest) return;
        const resolve = state.quantityRequest;
        state.quantityRequest = null;
        closeQuantityDialog();
        resolve(value);
      }

      function submitQuantityDialog(e) {
        e.preventDefault();
        settleQuantityRequest(els.quantityInput.value.trim());
      }

      function cancelQuantityDialog() {
        settleQuantityRequest(null);
      }

      function upsertFromDialog(e) {
        e.preventDefault();
        const name = els.nameInput.value.trim();
        const unit = els.unitInput.value.trim();
        const stock = toNumber(els.stockInput.value);
        const thresholdRaw = els.thresholdInput.value.trim();
        const memo = els.memoInput.value.trim();

        if (!name || !unit || !Number.isFinite(stock) || stock < 0) {
          alert("サプリ名・在庫数(0以上)・単位は必須です。");
          return;
        }

        let threshold = null;
        if (thresholdRaw !== "") {
          const t = toNumber(thresholdRaw);
          if (!Number.isFinite(t) || t < 0) {
            alert("補充目安は0以上の数値で入力してください。");
            return;
          }
          threshold = Math.round(t * 100) / 100;
        }

        snapshotForUndo();

        if (state.editingId) {
          const idx = state.supplements.findIndex((s) => s.id === state.editingId);
          if (idx >= 0) {
            const prev = state.supplements[idx];
            state.supplements[idx] = {
              ...prev,
              name,
              stock: Math.round(stock * 100) / 100,
              unit,
              threshold,
              memo: memo.slice(0, 300),
              updatedAt: new Date().toISOString(),
            };
          }
        } else {
          const now = new Date().toISOString();
          state.supplements.push({
            id: uid(),
            name,
            stock: Math.round(stock * 100) / 100,
            unit,
            threshold,
            memo: memo.slice(0, 300),
            history: [],
            createdAt: now,
            updatedAt: now,
          });
        }

        saveState();
        closeDialog();
        render();
      }

      async function handleCardAction(e) {
        const action = e.currentTarget.dataset.action;
        const id = e.currentTarget.dataset.id;
        const item = state.supplements.find((s) => s.id === id);
        if (!item) return;

        if (action === "increase" || action === "decrease") {
          const input = await requestQuantity(item, action);
          if (input === null) return;
          if (!/^[0-9]+$/.test(input)) {
            alert("1以上の整数を入力してください。");
            return;
          }

          const amount = toNumber(input);
          if (!Number.isFinite(amount) || amount <= 0 || !Number.isInteger(amount)) {
            alert("1以上の整数を入力してください。");
            return;
          }

          snapshotForUndo();

          const nextStock = action === "increase"
            ? item.stock + amount
            : Math.max(0, item.stock - amount);
          const signed = action === "increase" ? amount : -amount;

          item.stock = Math.round(nextStock * 100) / 100;
          item.history.push({ at: new Date().toISOString(), amount: Math.round(signed * 100) / 100 });
          item.history = item.history.slice(-5);
          item.updatedAt = new Date().toISOString();

          saveState();
          render();
          return;
        }

        if (action === "edit") {
          openEditDialog(item);
          return;
        }

        if (action === "delete") {
          if (!confirm(`「${item.name}」を削除します。よろしいですか？`)) return;
          snapshotForUndo();
          state.supplements = state.supplements.filter((s) => s.id !== item.id);
          saveState();
          render();
        }
      }

      function exportJson() {
        const payload = {
          exportedAt: new Date().toISOString(),
          supplements: state.supplements,
        };

        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `supplements_${new Date().toISOString().slice(0, 10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
      }

      function importJson(file) {
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(String(reader.result || "{}"));
            const rawItems = Array.isArray(parsed) ? parsed : parsed.supplements;
            if (!Array.isArray(rawItems)) {
              alert("不正なJSON形式です。配列または supplements 配列を含めてください。");
              return;
            }

            const normalized = rawItems
              .slice(0, IMPORT_MAX_ITEMS)
              .map((item) => normalizeItem(item))
              .filter(Boolean);

            if (normalized.length === 0) {
              alert("有効なデータが見つかりませんでした。");
              return;
            }

            if (!confirm(`既存データを上書きして ${normalized.length} 件を読み込みます。よろしいですか？`)) {
              return;
            }

            snapshotForUndo();
            state.supplements = normalized;
            saveState();
            render();
            alert("インポートしました。");
          } catch (_) {
            alert("JSONの読み込みに失敗しました。");
          } finally {
            els.importInput.value = "";
          }
        };

        reader.readAsText(file);
      }

      function bindEvents() {
        els.addBtn.addEventListener("click", openAddDialog);
        els.undoBtn.addEventListener("click", applyUndo);
        els.exportBtn.addEventListener("click", exportJson);
        els.importBtn.addEventListener("click", () => {
          els.importInput.click();
        });
        els.cancelDialogBtn.addEventListener("click", closeDialog);
        els.form.addEventListener("submit", upsertFromDialog);
        els.cancelQuantityBtn.addEventListener("click", cancelQuantityDialog);
        els.quantityForm.addEventListener("submit", submitQuantityDialog);
        els.quantityDialog.addEventListener("cancel", (e) => {
          e.preventDefault();
          cancelQuantityDialog();
        });

        els.importInput.addEventListener("change", (e) => {
          const file = e.target.files && e.target.files[0];
          if (!file) return;
          importJson(file);
        });
      }

      function init() {
        loadState();
        bindEvents();
        clearUndo();
        render();
      }

      init();
    })();
  </script>
</body>
</html>
